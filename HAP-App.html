/* ===== AI PREDICTION ENGINE ===== */
const DEF_PARAMS = { trendImpact:0, demandLevel:3, supplyLevel:3, conditionLevel:3, timing:1 };

const calcPrice = (base, p) => {
  const tMul  = 1 + p.trendImpact * 0.04;
  const dMul  = 0.8 + (p.demandLevel - 1) * 0.1;
  const sMul  = 1.2 - (p.supplyLevel - 1) * 0.1;
  const cMul  = 0.7 + (p.conditionLevel - 1) * 0.1;
  const tiMul = [0.85, 1.0, 1.12][p.timing - 1];
  return Math.round(base * tMul * dMul * sMul * cMul * tiMul / 1000) * 1000;
};

const parseNLP = (text, cur) => {
  const p = { ...cur };
  if (/트렌드.*(높|강|핫|인기)/.test(text))  p.trendImpact = Math.min(5, p.trendImpact + 2);
  if (/트렌드.*(낮|약|식|인기없)/.test(text)) p.trendImpact = Math.max(-5, p.trendImpact - 2);
  if (/수요.*(많|높|강|증가)/.test(text))     p.demandLevel = Math.min(5, p.demandLevel + 1);
  if (/수요.*(적|낮|약|감소)/.test(text))     p.demandLevel = Math.max(1, p.demandLevel - 1);
  if (/공급.*(많|높|풍부)/.test(text))        p.supplyLevel = Math.min(5, p.supplyLevel + 1);
  if (/공급.*(적|부족|희소)/.test(text))      p.supplyLevel = Math.max(1, p.supplyLevel - 1);
  if (/(새것|미사용|A급|최상)/.test(text))    p.conditionLevel = 5;
  if (/(상태좋|B급|양호)/.test(text))         p.conditionLevel = 4;
  if (/(보통|C급|일반)/.test(text))           p.conditionLevel = 3;
  if (/(상태나쁨|D급|흠집)/.test(text))       p.conditionLevel = 2;
  if (/(지금|즉시|바로)/.test(text))          p.timing = 1;
  if (/(한달|1개월|중기)/.test(text))         p.timing = 2;
  if (/(장기|3개월|여유)/.test(text))         p.timing = 3;
  return p;
};

const fmt      = n => n ? n.toLocaleString('ko-KR') + '원' : '-';
const fmtShort = n => n >= 10000 ? (n/10000).toFixed(1).replace(/\.0$/,'') + '만' : n.toLocaleString();
const fmtPct   = (a,b) => b ? `${a>b?'+':''}${Math.round((a-b)/b*100)}%` : '-';

/* ===== SPARKLINE ===== */
const Sparkline = ({ data, width=80, height=28 }) => {
  if (!data || data.length < 2) return null;
  const min = Math.min(...data), max = Math.max(...data), range = max - min || 1;
  const pts = data.map((v,i) => `${(i/(data.length-1))*width},${height-((v-min)/range)*height*0.85-height*0.05}`).join(' ');
  const rising = data[data.length-1] >= data[0];
  const c = rising ? C.green : C.red;
  const uid = `sg${data[0]}${width}`;
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{display:'block'}}>
      <defs>
        <linearGradient id={uid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={c} stopOpacity="0.25"/>
          <stop offset="100%" stopColor={c} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <polyline points={pts} fill="none" stroke={c} strokeWidth="2" strokeLinejoin="round"/>
    </svg>
  );
};

/* ===== AI CHATBOT ===== */
const AIChatbot = ({ product }) => {
  const [msgs, setMsgs] = useState([{
    role:'ai',
    text: product
      ? `🤖 **${product.title}** 분석 모드\n\n현재가 ${fmt(product.price)} → AI 적정가 **${fmt(product.aiPrice)}**\n상승 확률 ${product.aiRiseProb}% · 신뢰도 ${product.aiConfidence}%\n\n시장 상황을 자연어로 입력해주세요!\n예: "수요가 많고 공급이 부족해"`
      : '🤖 AI 가격 예측 챗봇입니다.\n분석할 상품을 선택하거나 시장 상황을 입력해보세요!'
  }]);
  const [input, setInput] = useState('');
  const [params, setParams] = useState(DEF_PARAMS);
  const [loading, setLoading] = useState(false);
  const endRef = useRef(null);

  useEffect(() => { endRef.current?.scrollIntoView({ behavior:'smooth' }); }, [msgs]);

  const send = () => {
    const txt = input.trim();
    if (!txt) return;
    setInput('');
    setMsgs(m => [...m, { role:'user', text:txt }]);
    setLoading(true);
    setTimeout(() => {
      const newP = parseNLP(txt, params);
      setParams(newP);
      const base = product ? product.price : 100000;
      const pred = calcPrice(base, newP);
      const diff = pred - base;
      const sign = diff >= 0 ? '+' : '';
      let reply = `**파라미터 업데이트** ✅\n수요 ${newP.demandLevel}/5 · 공급 ${newP.supplyLevel}/5 · 상태 ${newP.conditionLevel}/5 · 트렌드 ${newP.trendImpact>0?'+':''}${newP.trendImpact}\n\n💰 예측가: **${fmt(pred)}**\n변동: ${sign}${fmt(Math.abs(diff))} (${sign}${((diff/base)*100).toFixed(1)}%)\n\n`;
      if (newP.demandLevel >= 4 && newP.supplyLevel <= 2) {
        reply += '🔥 수요↑ 공급↓ — **강력 매수 시그널**';
      } else if (newP.demandLevel <= 2 || newP.supplyLevel >= 4) {
        reply += '📉 수요 약세 또는 과공급 — **가격 하락 경고**';
      } else if (newP.trendImpact >= 3) {
        reply += '📈 트렌드 강세 — **가격 상승 가능성 높음**';
      } else {
        reply += '⚖️ 시장 균형 — **현재 가격이 적정 수준**';
      }
      setMsgs(m => [...m, { role:'ai', text:reply }]);
      setLoading(false);
    }, 900);
  };

  const renderText = t => t.split('\n').map((line,i) => (
    <div key={i} style={{marginBottom:line?2:6}}>
      {line.split(/(\*\*[^*]+\*\*)/g).map((seg,j) =>
        seg.startsWith('**') ? <strong key={j} style={{color:C.purpleXL}}>{seg.slice(2,-2)}</strong> : seg
      )}
    </div>
  ));

  const sugg = ['수요가 많고 공급이 부족해','상태는 새것 수준이야','지금 즉시 팔고싶어','트렌드가 낮아지는 중','3개월 장기 보유 예정'];

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
      <div style={{flex:1,overflowY:'auto',padding:'14px',display:'flex',flexDirection:'column',gap:10}}>
        {msgs.map((m,i) => (
          <div key={i} style={{display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start',gap:8}}>
            {m.role==='ai' && <div style={{width:26,height:26,borderRadius:'50%',background:C.gPurple,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,flexShrink:0,marginTop:2}}>🤖</div>}
            <div style={{maxWidth:'80%',background:m.role==='user'?C.gPurple:C.card2,border:m.role==='ai'?`1px solid ${C.border}`:'none',color:C.t1,borderRadius:m.role==='user'?'14px 14px 4px 14px':'14px 14px 14px 4px',padding:'9px 13px',fontSize:13,lineHeight:1.55}}>
              {renderText(m.text)}
            </div>
          </div>
        ))}
        {loading && (
          <div style={{display:'flex',gap:8}}>
            <div style={{width:26,height:26,borderRadius:'50%',background:C.gPurple,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12}}>🤖</div>
            <div style={{background:C.card2,border:`1px solid ${C.border}`,borderRadius:'14px 14px 14px 4px',padding:'10px 14px',display:'flex',gap:4}}>
              {[0,1,2].map(i=><div key={i} className="dot-pulse" style={{width:6,height:6,borderRadius:'50%',background:C.purple,animationDelay:`${i*0.2}s`}}/>)}
            </div>
          </div>
        )}
        <div ref={endRef}/>
      </div>
      <div style={{padding:'0 12px 6px',display:'flex',gap:6,overflowX:'auto',scrollbarWidth:'none'}}>
        {sugg.map((s,i) => <button key={i} onClick={()=>setInput(s)} style={{background:C.card2,border:`1px solid ${C.border}`,color:C.purpleL,borderRadius:14,padding:'4px 10px',fontSize:11,cursor:'pointer',whiteSpace:'nowrap',flexShrink:0}}>{s}</button>)}
      </div>
      <div style={{padding:'6px 12px 14px',display:'flex',gap:8}}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()} placeholder="자연어로 시장 상황을 입력하세요..."
          style={{flex:1,background:C.card2,border:`1px solid ${C.border}`,borderRadius:10,padding:'10px 13px',color:C.t1,fontSize:13,outline:'none'}}/>
        <button onClick={send} style={{background:C.gPurple,border:'none',borderRadius:10,padding:'10px 12px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <ISend size={15} color="#fff"/>
        </button>
      </div>
    </div>
  );
};

                <div style={{fontSize:13,fontWeight:700,color:C.green}}>+{p.aiRise}%</div>

                <div style={{fontSize:11,color:C.t1,fontWeight:600,marginBottom:4}}>{p.title.slice(0,10)}…</div>
                <div style={{fontSize:12,color:C.green,fontWeight:700}}>{fmtShort(p.price)}원</div>
                <div style={{fontSize:9,color:C.t3}}>신뢰도 {p.aiConfidence}%</div>
              </div>
            ))}

        {/* Filter */}
        <div style={{display:'flex',gap:7,overflowX:'auto',scrollbarWidth:'none',marginBottom:10,paddingBottom:2}}>
          {CATEGORIES.map(c=>(
            <button key={c} onClick={()=>setCat(c)} style={{flexShrink:0,background:cat===c?C.gPurple:C.card,border:`1px solid ${cat===c?'transparent':C.border}`,color:cat===c?'#fff':C.t2,borderRadius:20,padding:'6px 14px',fontSize:12,cursor:'pointer',fontWeight:cat===c?700:400}}>{c}</button>
          ))}

            <option value="price">가격순</option>
            <option value="views">인기순</option>
          </select>
        </div>

        {/* Grid */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,paddingBottom:10}}>
          {filtered.map(p=><ProductCard key={p.id} p={p} onClick={()=>onProduct(p)}/>)}
        </div>
        {filtered.length===0 && <div style={{textAlign:'center',padding:'40px',color:C.t3}}>검색 결과가 없어요 🔍</div>}
      </div>
    </div>
  );
};

/* ===== AI ANALYSIS PAGE ===== */

  const [tab, setTab] = useState('analysis');

  const scenarios = {

    normal:      { label:'보통', color:C.purple, mul:1.0,  desc:'현재 시장 유지' },
    pessimistic: { label:'비관', color:C.red,    mul:0.82, desc:'수요 감소·공급 증가' },

              <div>

              </div>
            </div>
            <div style={{height:'calc(100% - 58px)'}}>
              <AIChatbot product={selected}/>
            </div>

        {tab==='strategy' && (
          <>
            <div style={{fontSize:12,color:C.t2,marginBottom:14}}>AI가 분류한 거래 전략 카드</div>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:7,marginBottom:13}}>

              {label:'리스크',  val:<RiskBadge r={p.aiRisk}/>},

              {label:'상승 여력',  val:<span style={{fontSize:11,fontWeight:700,color:p.aiRise>0?C.green:C.red}}>{p.aiRise>0?'+':''}{p.aiRise}%</span>},

            ))}
          </div>

          <button onClick={()=>setShowChat(true)} style={{width:'100%',marginTop:11,background:'rgba(139,92,246,0.1)',border:`1px solid ${C.purple}`,borderRadius:11,padding:'11px',color:C.purpleXL,fontSize:13,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:7}}>
            <IMsg size={15} color={C.purpleXL}/> AI와 가격 시나리오 분석하기
          </button>
        </div>

        {/* Buy/Sell Advisor */}
        <TimingAdvisor p={p}/>

        {/* Product Info */}
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:'14px',marginBottom:12}}>
          <div style={{fontSize:13,fontWeight:700,color:C.t1,marginBottom:11}}>상품 정보</div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:10}}>
            {[['상태',p.condition],['위치',p.location],['조회',`${p.views}회`]].map(([k,v])=>(
              <div key={k} style={{background:C.card2,borderRadius:7,padding:'5px 9px',fontSize:11}}>
                <span style={{color:C.t3}}>{k} </span><span style={{color:C.t1,fontWeight:600}}>{v}</span>
              </div>
            ))}
          </div>
          <div style={{fontSize:12,color:C.t2,lineHeight:1.65}}>{p.desc}</div>
          <div style={{display:'flex',gap:5,flexWrap:'wrap',marginTop:10}}>
            {p.tags.map(t=><span key={t} style={{background:C.card2,border:`1px solid ${C.border}`,color:C.t3,borderRadius:20,fontSize:10,padding:'3px 9px'}}>#{t}</span>)}
          </div>
        </div>

        {/* Seller */}
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:'14px'}}>
          <div style={{display:'flex',alignItems:'center',gap:11}}>
            <div style={{width:42,height:42,borderRadius:'50%',background:C.gPurple,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>👤</div>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:700,color:C.t1}}>{p.seller}</div>
              <div style={{fontSize:11,color:C.t3}}>판매 {p.sellerSales}건</div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:4}}>
              <IStar size={13} color={C.yellow} fill={C.yellow}/>
              <span style={{fontWeight:700,color:C.t1,fontSize:14}}>{p.sellerScore}</span>
            </div>
          </div>
        </div>
      </div>

      {/* Bottom CTA */}
      <div style={{position:'fixed',bottom:0,left:0,right:0,background:C.card,borderTop:`1px solid ${C.border}`,padding:'10px 14px 14px',display:'flex',gap:9,zIndex:20}}>
        <button onClick={()=>setShowChat(true)} style={{flex:1,background:C.card2,border:`1px solid ${C.border}`,borderRadius:11,padding:'13px',color:C.purpleL,fontSize:13,fontWeight:700,cursor:'pointer'}}>
          🤖 AI 예측
        </button>
        <button style={{flex:2,background:C.gPurple,border:'none',borderRadius:11,padding:'13px',color:'#fff',fontSize:14,fontWeight:800,cursor:'pointer'}}>
          구매하기
        </button>
      </div>
    </div>
  );
};

/* ===== SELL PAGE ===== */
const SellPage = () => {
  const [form, setForm] = useState({ title:'', price:'', cat:'', desc:'' });
  const [aiResult, setAiResult] = useState(null);
  const [analyzing, setAnalyzing] = useState(false);

  const runAI = () => {
    if (!form.title) return;
    setAnalyzing(true);
    setTimeout(() => {
      const base = 150000 + Math.random() * 100000;
      const suggested = Math.round(base / 1000) * 1000;
      setAiResult({ price:suggested, min:Math.round(suggested*0.78/1000)*1000, max:Math.round(suggested*1.22/1000)*1000, confidence:Math.round(72+Math.random()*22), timing:'즉시~2주', trend:'up', riseProb:Math.round(55+Math.random()*35) });
      setAnalyzing(false);
    }, 1500);
  };

  return (
    <div style={{padding:'20px 14px 80px'}}>
      <div style={{fontSize:21,fontWeight:800,color:C.t1,marginBottom:3}}>판매 등록 ✍️</div>
      <div style={{fontSize:12,color:C.t2,marginBottom:20}}>AI가 최적 가격을 제안해드려요</div>

      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:15,padding:'15px',marginBottom:14}}>
        <div style={{fontSize:13,fontWeight:700,color:C.t1,marginBottom:13}}>📝 상품 정보</div>
        {[['title','상품명','나이키 에어맥스 97...'],['price','희망 가격 (원)','89000']].map(([k,label,ph])=>(
          <div key={k} style={{marginBottom:11}}>
            <div style={{fontSize:11,color:C.t3,marginBottom:5}}>{label}</div>
            <input value={form[k]} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))} placeholder={ph}
              style={{width:'100%',background:C.card2,border:`1px solid ${C.border}`,borderRadius:9,padding:'9px 11px',color:C.t1,fontSize:13,outline:'none'}}/>
          </div>
        ))}
        <div style={{marginBottom:11}}>
          <div style={{fontSize:11,color:C.t3,marginBottom:5}}>상품 설명</div>
          <textarea value={form.desc} onChange={e=>setForm(f=>({...f,desc:e.target.value}))} placeholder="상태, 구매 시기 등..." rows={3}
            style={{width:'100%',background:C.card2,border:`1px solid ${C.border}`,borderRadius:9,padding:'9px 11px',color:C.t1,fontSize:13,outline:'none',resize:'vertical'}}/>
        </div>
        <div style={{display:'flex',gap:6,marginBottom:13,flexWrap:'wrap'}}>
          {['패션','전자기기','가구','스포츠','수집품'].map(c=>(
            <button key={c} onClick={()=>setForm(f=>({...f,cat:c}))} style={{background:form.cat===c?C.gPurple:C.card2,border:`1px solid ${form.cat===c?'transparent':C.border}`,color:form.cat===c?'#fff':C.t2,borderRadius:8,padding:'6px 12px',fontSize:12,cursor:'pointer',fontWeight:form.cat===c?700:400}}>
              {c}
            </button>
          ))}
        </div>
        <button onClick={runAI} disabled={!form.title} style={{width:'100%',background:form.title?C.gPurple:'rgba(139,92,246,0.15)',border:'none',borderRadius:11,padding:'12px',color:'#fff',fontSize:14,fontWeight:700,cursor:form.title?'pointer':'default',display:'flex',alignItems:'center',justifyContent:'center',gap:7}}>
          {analyzing
            ? <><div className="spin" style={{width:15,height:15,border:`2px solid rgba(255,255,255,0.3)`,borderTopColor:'#fff',borderRadius:'50%'}}/> AI 분석 중...</>
            : <><IBrain size={15} color="#fff"/> AI 가격 분석</>}
        </button>
      </div>

      {aiResult && (
        <div style={{background:C.gCard,border:`2px solid ${C.border3}`,borderRadius:15,padding:'15px',marginBottom:14,animation:'fadeIn .3s ease'}}>
          <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:13}}>
            <IBrain size={15} color={C.purpleL}/>
            <span style={{fontSize:13,fontWeight:700,color:C.purpleXL}}>AI 가격 제안</span>
            <span style={{fontSize:10,color:C.t3,marginLeft:'auto'}}>신뢰도 {aiResult.confidence}%</span>
          </div>
          <div style={{textAlign:'center',marginBottom:13}}>
            <div style={{fontSize:10,color:C.t3}}>추천 등록가</div>
            <div style={{fontSize:30,fontWeight:900,color:C.purpleXL,marginTop:2}}>{fmt(aiResult.price)}</div>
            <div style={{fontSize:11,color:C.t3,marginTop:3}}>{fmt(aiResult.min)} ~ {fmt(aiResult.max)}</div>
          </div>
          <div style={{background:C.card2,borderRadius:11,padding:'11px',marginBottom:12}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:5}}>
              <span style={{color:C.t3}}>최적 판매 타이밍</span>
              <span style={{color:C.cyan,fontWeight:700}}>{aiResult.timing}</span>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:11}}>
              <span style={{color:C.t3}}>가격 상승 가능성</span>
              <span style={{color:C.green,fontWeight:700}}>{aiResult.riseProb}%</span>
            </div>
          </div>
          <div style={{display:'flex',gap:7}}>
            <button onClick={()=>setForm(f=>({...f,price:String(aiResult.min)}))} style={{flex:1,background:C.card2,border:`1px solid ${C.border}`,borderRadius:9,padding:'9px',color:C.red,fontSize:12,cursor:'pointer',fontWeight:600}}>최저 {fmtShort(aiResult.min)}원</button>
            <button onClick={()=>setForm(f=>({...f,price:String(aiResult.price)}))} style={{flex:1,background:C.gPurple,border:'none',borderRadius:9,padding:'9px',color:'#fff',fontSize:12,cursor:'pointer',fontWeight:700}}>추천 {fmtShort(aiResult.price)}원</button>
            <button onClick={()=>setForm(f=>({...f,price:String(aiResult.max)}))} style={{flex:1,background:C.card2,border:`1px solid ${C.border}`,borderRadius:9,padding:'9px',color:C.green,fontSize:12,cursor:'pointer',fontWeight:600}}>최고 {fmtShort(aiResult.max)}원</button>
          </div>
        </div>
      )}

      <div style={{background:C.card,border:`2px dashed ${C.border}`,borderRadius:14,padding:'22px',textAlign:'center',cursor:'pointer',marginBottom:14}}>
        <ICamera size={30} color={C.t3}/>
        <div style={{fontSize:12,color:C.t3,marginTop:7}}>사진 추가 (최대 10장)</div>
      </div>

      <button style={{width:'100%',background:C.gPurple,border:'none',borderRadius:13,padding:'15px',color:'#fff',fontSize:15,fontWeight:800,cursor:'pointer'}}>
        판매 등록하기
      </button>
    </div>
  );
};

/* ===== NOTIF PAGE ===== */
const NotifPage = () => {
  const notifs = [
    { icon:'💎', title:'저평가 상품 발견!', desc:'나이키 에어맥스 97 — AI 시세 대비 15% 저렴. 즉시 매수 권장', time:'방금', c:C.green },
    { icon:'📈', title:'가격 상승 알림', desc:'레고 스타워즈 팔콘 — 10% 상승 (52만원)', time:'1시간 전', c:C.purple },
    { icon:'⚡', title:'즉시 매수 기회', desc:'샤넬 플랩백 — AI 신뢰도 91%, 즉시 매수 권장', time:'3시간 전', c:C.orange },
    { icon:'🔔', title:'관심 상품 가격 변동', desc:'소니 WH-1000XM5 — 5% 하락. 관망 권장', time:'어제', c:C.cyan },
    { icon:'🤖', title:'AI 주간 리포트', desc:'이번 주 최고 수익률: 레고 스타워즈 +21%. 저평가 3종 발견', time:'2일 전', c:C.yellow },
  ];

  return (
    <div style={{padding:'20px 14px 80px'}}>
      <div style={{fontSize:21,fontWeight:800,color:C.t1,marginBottom:3}}>알림 🔔</div>
      <div style={{fontSize:12,color:C.t2,marginBottom:20}}>AI 실시간 시장 알림</div>
      <div style={{display:'flex',flexDirection:'column',gap:9}}>
        {notifs.map((n,i)=>(
          <div key={i} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:13,padding:'13px',display:'flex',gap:11,alignItems:'flex-start'}}>
            <div style={{width:38,height:38,borderRadius:'50%',background:`${n.c}20`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>{n.icon}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:700,color:C.t1,marginBottom:3}}>{n.title}</div>
              <div style={{fontSize:11,color:C.t2,lineHeight:1.5,marginBottom:4}}>{n.desc}</div>
              <div style={{fontSize:10,color:C.t3}}>{n.time}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

/* ===== MY PAGE ===== */
const MyPage = () => {
  const stats = [
    {label:'거래 완료',val:'12건',icon:'📦',c:C.purple},
    {label:'총 절약액',val:'34만원',icon:'💰',c:C.green},
    {label:'AI 적중률',val:'87%',icon:'🎯',c:C.cyan},
    {label:'관심 상품',val:'8개',icon:'❤️',c:C.red},
  ];
  const menus = [
    {Icon:IPackage, label:'구매 내역', sub:'12건'},
    {Icon:IBarChart,label:'AI 분석 기록', sub:'23회'},
    {Icon:IBell,    label:'알림 설정', sub:''},
    {Icon:IShield,  label:'보안 설정', sub:''},
    {Icon:ISettings,label:'앱 설정', sub:''},
    {Icon:ILogOut,  label:'로그아웃', sub:'', c:C.red},
  ];

  return (
    <div style={{padding:'20px 14px 80px'}}>
      <div style={{background:C.gHero,borderRadius:18,padding:'22px',marginBottom:18,textAlign:'center'}}>
        <div style={{width:68,height:68,borderRadius:'50%',background:'rgba(255,255,255,0.12)',margin:'0 auto 10px',display:'flex',alignItems:'center',justifyContent:'center',fontSize:32}}>👤</div>
        <div style={{fontSize:19,fontWeight:800,color:'#fff'}}>마켓 인텔리전서</div>
        <div style={{fontSize:12,color:'rgba(255,255,255,0.55)',marginTop:3}}>AI 등급: 🏆 플래티넘</div>
        <div style={{display:'flex',justifyContent:'center',gap:3,marginTop:10}}>
          {[...Array(5)].map((_,i)=><IStar key={i} size={14} color={C.yellow} fill={C.yellow}/>)}
          <span style={{color:'#fff',marginLeft:4,fontWeight:700}}>4.9</span>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:9,marginBottom:18}}>
        {stats.map((s,i)=>(
          <div key={i} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:13,padding:'13px',textAlign:'center'}}>
            <div style={{fontSize:22,marginBottom:5}}>{s.icon}</div>
            <div style={{fontSize:19,fontWeight:800,color:s.c}}>{s.val}</div>
            <div style={{fontSize:10,color:C.t3,marginTop:2}}>{s.label}</div>
          </div>
        ))}
      </div>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,overflow:'hidden'}}>
        {menus.map((m,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:13,padding:'14px',borderBottom:i<menus.length-1?`1px solid ${C.border2}`:'none',cursor:'pointer'}}>
            <m.Icon size={19} color={m.c||C.t2}/>
            <span style={{flex:1,fontSize:13,color:m.c||C.t1,fontWeight:500}}>{m.label}</span>
            {m.sub && <span style={{fontSize:11,color:C.t3}}>{m.sub}</span>}
            <IChevR size={14} color={C.t3}/>
          </div>
        ))}
      </div>
    </div>
  );
};

/* ===== BOTTOM NAV ===== */
const BottomNav = ({ tab, setTab }) => {
  const tabs = [
    {id:'market', label:'시장',  Icon:IHome},
    {id:'ai',     label:'AI분석',Icon:IBrain},
    {id:'sell',   label:'판매',  Icon:IPlus, special:true},
    {id:'notif',  label:'알림',  Icon:IBell},
    {id:'my',     label:'MY',    Icon:IUser},
  ];
  return (
    <div style={{position:'fixed',bottom:0,left:0,right:0,maxWidth:480,margin:'0 auto',background:C.card,borderTop:`1px solid ${C.border}`,display:'flex',zIndex:100}}>
      {tabs.map(t=>(
        <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:'none',border:'none',padding:'9px 4px 7px',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
          {t.special ? (
            <div style={{width:42,height:42,borderRadius:'50%',background:C.gPurple,display:'flex',alignItems:'center',justifyContent:'center',marginTop:-18,boxShadow:`0 4px 18px rgba(139,92,246,0.55)`}}>
              <t.Icon size={20} color="#fff"/>
            </div>
          ) : (
            <t.Icon size={21} color={tab===t.id?C.purple:C.t3}/>
          )}
          <span style={{fontSize:9,color:t.special?C.purpleL:tab===t.id?C.purple:C.t3,fontWeight:tab===t.id?700:400,marginTop:t.special?3:0}}>{t.label}</span>
        </button>
      ))}
    </div>
  );
};

/* ===== FLOATING AI BUTTON ===== */
const FloatingAI = ({ onClick }) => (
  <button onClick={onClick} title="AI 분석 열기" style={{position:'fixed',right:14,bottom:72,width:52,height:52,borderRadius:'50%',background:C.gPurple,border:'none',cursor:'pointer',zIndex:90,fontSize:21,boxShadow:`0 6px 22px rgba(139,92,246,0.65)`,transition:'transform .18s'}}
    onMouseEnter={e=>e.currentTarget.style.transform='scale(1.12)'}
    onMouseLeave={e=>e.currentTarget.style.transform='scale(1)'}
  >🔮</button>
);

/* ===== APP ===== */
const App = () => {
  const [tab, setTab] = useState('market');
  const [detail, setDetail] = useState(null);

  if (detail) return <DetailPage product={detail} onBack={()=>setDetail(null)}/>;

  return (
    <div style={{maxWidth:480,margin:'0 auto',minHeight:'100vh',position:'relative'}}>
      <div style={{overflowY:'auto',height:'100vh',scrollbarWidth:'thin',scrollbarColor:`${C.purple} ${C.bg}`}}>
        {tab==='market' && <MarketPage onProduct={setDetail}/>}
        {tab==='ai'     && <AIPage     onProduct={setDetail}/>}
        {tab==='sell'   && <SellPage/>}
        {tab==='notif'  && <NotifPage/>}
        {tab==='my'     && <MyPage/>}
      </div>
      <FloatingAI onClick={()=>setTab('ai')}/>
      <BottomNav tab={tab} setTab={setTab}/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
